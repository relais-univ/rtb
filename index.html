<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTB Direct – Burkina</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --yt-gray: #f2f2f2;
            --yt-hover: #e5e5e5;
            --font-main: "Roboto", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); -webkit-tap-highlight-color: transparent; }
        body { background: #ffffff; color: #0f0f0f; overflow-x: hidden; padding-bottom: 20px; }
        
        header {
            display: flex; align-items: center; padding: 0 15px; 
            background: #fff; height: 75px;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #eee;
        }
        .logo-rtb { height: 50px; width: auto; }
        .divider { width: 1px; height: 28px; background: #eee; margin: 0 15px; }
        .slogan { font-size: 10px; font-weight: 700; color: #606060; text-transform: uppercase; line-height: 1.2; }

        .player-container { width: 100%; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; }

        .video-info { padding: 20px 15px; border-bottom: 1px solid #eee; }
        .video-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; }

        .action-bar { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; padding-bottom: 5px; }
        .yt-btn {
            display: flex; align-items: center; gap: 8px; background: var(--yt-gray);
            padding: 0 20px; height: 44px; border-radius: 22px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .yt-btn:active { background: var(--yt-hover); transform: scale(0.98); }

        .archive-header { padding: 25px 15px 10px; font-size: 17px; font-weight: 700; }
        .slider-wrapper { width: 100%; overflow-x: auto; scrollbar-width: none; cursor: grab; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        .slider-track { display: flex; gap: 15px; padding: 0 15px 20px; width: max-content; }

        .news-item { flex: 0 0 160px; cursor: pointer; }
        .thumb-wrapper { 
            width: 100%; aspect-ratio: 16/9; background: #000; 
            border-radius: 12px; overflow: hidden; position: relative;
        }
        .thumb-wrapper::after {
            content: '▶'; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white;
            background: rgba(0,0,0,0.6); width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 12px;
        }
        .news-item img { width: 100%; height: 100%; object-fit: cover; }
        .news-item span { display: block; padding-top: 8px; font-size: 12px; font-weight: 600; }

        .footer-card { margin: 15px; padding: 20px; background: var(--yt-gray); border-radius: 15px; text-align: center; }
        .wa-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 32px; 
            text-decoration: none; font-weight: 700; background: #25D366; color: white; border: none;
        }
    </style>
</head>
<body>

    <header>
        <img src="1001826386.png" alt="RTB" class="logo-rtb">
        <div class="divider"></div>
        <div class="slogan">La Télévision<br>du Burkina</div>
    </header>

    <div class="player-container">
        <video id="rtbLive" controls playsinline autoplay></video>
    </div>

    <div class="video-info">
        <h1 id="mainTitle" class="video-title">RTB en Direct — La Télévision du Burkina</h1>
        <div class="action-bar">
            <button class="yt-btn" onclick="revenirAuDirect()" style="color: #d32f2f;"><span>🔴</span> Direct</button>
            <button class="yt-btn" onclick="telechargerVideo()"><span>⬇️</span> Télécharger</button>
            <button class="yt-btn" onclick="partagerApp()"><span>📤</span> Partager</button>
        </div>
    </div>

    <div class="archive-header">Annonces & Replay</div>
    <div class="slider-wrapper" id="scrollContainer">
        <div class="slider-track" id="sliderTrack"></div>
    </div>

    <div class="footer-card">
        <button onclick="ouvrirWhatsApp()" class="wa-btn">
            <span>💬</span> Écrire à la RTB
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmRpW6YTVDKiFGOOLgF4_WjcS-7d5lYFQ",
            authDomain: "rtb-27dce.firebaseapp.com",
            databaseURL: "https://rtb-27dce-default-rtdb.firebaseio.com",
            projectId: "rtb-27dce",
            storageBucket: "rtb-27dce.firebasestorage.app",
            messagingSenderId: "935195587386",
            appId: "1:935195587386:web:fc2d62a42857b1caeb9603",
            measurementId: "G-0V9T2PC3EE"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let urlDirect = ""; 
        let videoEnCours = "";
        const videoPlayer = document.getElementById('rtbLive');
        const mainTitle = document.getElementById('mainTitle');

        db.ref('rtb_config').on('value', (snap) => {
            const val = snap.val() || {};
            urlDirect = val.directUrl;
            if(!videoEnCours) revenirAuDirect(); 
        });

        // 1. FONCTION PARTAGER (APPELLE LE MENU DU TÉLÉPHONE)
        async function partagerApp() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'RTB Direct - Burkina',
                        text: 'Je regarde la RTB en direct, rejoins-moi !',
                        url: window.location.href
                    });
                } catch (err) { console.log("Erreur partage:", err); }
            } else {
                alert("Le partage n'est pas supporté sur ce navigateur. Copiez le lien : " + window.location.href);
            }
        }

        // 2. FONCTION TÉLÉCHARGER (DANS LA GALÉRIE)
        async function telechargerVideo() {
            if(!videoEnCours) return;
            alert("Préparation du téléchargement...");
            
            try {
                const response = await fetch(videoEnCours);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'RTB_Video_' + Date.now() + '.mp4';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                alert("Téléchargement lancé !");
            } catch (error) {
                // Si la sécurité bloque le téléchargement direct (CORS)
                window.open(videoEnCours, '_blank');
            }
        }

        // 3. FONCTION WHATSAPP (OUVRE L'APPLICATION)
        function ouvrirWhatsApp() {
            const numero = "22625407871";
            const message = encodeURIComponent("Bonjour RTB, je vous contacte depuis l'application...");
            window.open(`https://wa.me/${numero}?text=${message}`, '_blank');
        }

        // --- GESTION DES REPLAYS ---
        function lireArchive(url, titre) {
            videoEnCours = url;
            videoPlayer.src = url;
            videoPlayer.play();
            mainTitle.innerText = "Replay : " + titre;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function revenirAuDirect() {
            videoEnCours = urlDirect;
            videoPlayer.src = urlDirect;
            mainTitle.innerText = "RTB en Direct — La Télévision du Burkina";
        }

        // Liste des archives (Exemple à modifier par l'admin)
        const archives = [
            { title: "Météo Burkina", thumb: "https://via.placeholder.com/160x90/388E3C/fff?text=METEO", url: "https://votre-lien-video-meteo.mp4" },
            { title: "Journal 20h", thumb: "https://via.placeholder.com/160x90/333/fff?text=JT", url: "https://votre-lien-video-jt.mp4" }
        ];

        document.getElementById('sliderTrack').innerHTML = [...archives, ...archives].map(item => `
            <div class="news-item" onclick="lireArchive('${item.url}', '${item.title}')">
                <div class="thumb-wrapper"><img src="${item.thumb}"></div>
                <span>${item.title}</span>
            </div>
        `).join('');

        // Animation Auto-Scroll
        const container = document.getElementById('scrollContainer');
        let isPaused = false;
        function autoScroll() {
            if (!isPaused) {
                container.scrollLeft += 1;
                if (container.scrollLeft >= (container.scrollWidth / 2)) container.scrollLeft = 0;
            }
            requestAnimationFrame(autoScroll);
        }
        autoScroll();
        container.addEventListener('touchstart', () => isPaused = true);
        container.addEventListener('touchend', () => setTimeout(() => isPaused = false, 2000));
    </script>
</body>
          </html>
