<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTB - Panneau de Contrôle Admin</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        h1 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        h2 { font-size: 18px; margin-top: 0; color: #333; }

        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { opacity: 0.9; }
        .btn-add { background: #2e7d32; margin-top: 10px; }

        .archive-item { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:10000; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="container" style="max-width: 400px;">
            <h2>Accès Administrateur RTB</h2>
            <input type="password" id="passInput" placeholder="Mot de passe">
            <button class="btn" onclick="checkPass()">Connexion</button>
        </div>
    </div>

    <div class="container">
        <h1>🎙️ Régie RTB Direct</h1>

        <div class="section">
            <h2>⚙️ Configuration Antenne</h2>
            
            <label>Lien du Flux Direct (URL .mp4 ou .m3u8)</label>
            <input type="text" id="directUrl" placeholder="https://...">

            <label>Slogan de l'en-tête (HTML autorisé)</label>
            <textarea id="slogan" rows="2"></textarea>

            <label>Numéro WhatsApp (ex: 226XXXXXXXX)</label>
            <input type="text" id="whatsapp">

            <label>Autoriser le téléchargement ?</label>
            <select id="allowDownload">
                <option value="oui">OUI - Afficher le bouton</option>
                <option value="non">NON - Masquer le bouton</option>
            </select>

            <button class="btn" onclick="saveGeneral()">Mettre à jour l'Antenne</button>
        </div>

        <div class="section">
            <h2>📚 Gestion des Archives & Replays</h2>
            <div id="archiveList">
                </div>

            <hr style="margin: 20px 0;">
            <h3>Ajouter un Replay / Annonce</h3>
            <label>Titre de la vidéo</label>
            <input type="text" id="newTitle" placeholder="Ex: Journal de 20h">
            
            <label>Lien de l'image (Miniature)</label>
            <input type="text" id="newThumb" placeholder="https://lien-image.jpg">
            
            <label>Lien de la Vidéo</label>
            <input type="text" id="newUrl" placeholder="https://lien-video.mp4">

            <button class="btn btn-add" onclick="addArchive()">Ajouter à la liste</button>
            <p style="font-size: 11px; color: #666; margin-top: 10px;">* Si vous supprimez toutes les archives, la section disparaîtra de l'application.</p>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE (Mise à jour rtb-27dce)
        const firebaseConfig = {
            apiKey: "AIzaSyDmRpW6YTVDKiFGOOLgF4_WjcS-7d5lYFQ",
            authDomain: "rtb-27dce.firebaseapp.com",
            databaseURL: "https://rtb-27dce-default-rtdb.firebaseio.com",
            projectId: "rtb-27dce",
            storageBucket: "rtb-27dce.firebasestorage.app",
            messagingSenderId: "935195587386",
            appId: "1:935195587386:web:fc2d62a42857b1caeb9603",
            measurementId: "G-0V9T2PC3EE"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Sécurité
        function checkPass() {
            const pass = document.getElementById('passInput').value;
            if(pass === "RTB2026") { // Changez votre mot de passe ici
                document.getElementById('loginOverlay').style.display = 'none';
            } else {
                alert("Accès refusé");
            }
        }

        // 2. Charger les données actuelles
        db.ref('rtb_config').on('value', (snap) => {
            const data = snap.val() || {};
            document.getElementById('directUrl').value = data.directUrl || "";
            document.getElementById('slogan').value = data.slogan || "";
            document.getElementById('whatsapp').value = data.whatsapp || "";
            document.getElementById('allowDownload').value = data.allowDownload || "non";
        });

        // 3. Sauvegarder Config Générale
        function saveGeneral() {
            db.ref('rtb_config').update({
                directUrl: document.getElementById('directUrl').value,
                slogan: document.getElementById('slogan').value,
                whatsapp: document.getElementById('whatsapp').value,
                allowDownload: document.getElementById('allowDownload').value
            }).then(() => alert("Configuration antenne mise à jour !"));
        }

        // 4. Gestion des Archives
        db.ref('archives').on('value', (snap) => {
            const data = snap.val();
            const listDiv = document.getElementById('archiveList');
            listDiv.innerHTML = "";
            
            if(data) {
                Object.keys(data).forEach(key => {
                    const item = data[key];
                    listDiv.innerHTML += `
                        <div class="archive-item">
                            <span><strong>${item.title}</strong></span>
                            <button class="delete-btn" onclick="deleteArchive('${key}')">Supprimer</button>
                        </div>
                    `;
                });
            } else {
                listDiv.innerHTML = "<p>Aucune archive en ligne.</p>";
            }
        });

        function addArchive() {
            const title = document.getElementById('newTitle').value;
            const thumb = document.getElementById('newThumb').value;
            const url = document.getElementById('newUrl').value;

            if(title && thumb && url) {
                db.ref('archives').push({ title, thumb, url }).then(() => {
                    alert("Archive ajoutée !");
                    document.getElementById('newTitle').value = "";
                    document.getElementById('newThumb').value = "";
                    document.getElementById('newUrl').value = "";
                });
            } else {
                alert("Veuillez remplir tous les champs.");
            }
        }

        function deleteArchive(id) {
            if(confirm("Supprimer cette archive ?")) {
                db.ref('archives').child(id).remove();
            }
        }
    </script>
</body>
  </html>
