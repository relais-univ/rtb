<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Régie RTB - Administration</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: var(--primary); font-size: 20px; text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .section { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-add { background: #2e7d32; margin-top: 10px; }
        .archive-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; margin-bottom: 5px; border-radius: 5px; font-size: 13px; }
        .del-btn { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; z-index:10000; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div style="text-align: center;">
            <h2>Accès Régie</h2>
            <input type="password" id="passInput" placeholder="Code">
            <button class="btn" onclick="checkPass()">Entrer</button>
        </div>
    </div>

    <div class="container">
        <h1>🎙️ Console RTB</h1>

        <div class="section">
            <label>Lien du Flux Direct (.mp4 ou .m3u8)</label>
            <input type="text" id="directUrl">
            <label>Slogan de l'en-tête</label>
            <input type="text" id="slogan">
            <label>WhatsApp (ex: 22600000000)</label>
            <input type="text" id="whatsapp">
            <label>Téléchargement ?</label>
            <select id="allowDownload"><option value="oui">OUI</option><option value="non">NON</option></select>
            <button class="btn" onclick="saveGeneral()">Mettre à jour l'Antenne</button>
        </div>

        <div class="section">
            <h3>Archives & Replays</h3>
            <div id="archiveList" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;"></div>
            <hr>
            <label>Nouveau Replay</label>
            <input type="text" id="newTitle" placeholder="Titre">
            <input type="text" id="newThumb" placeholder="Lien Image Miniature">
            <input type="text" id="newUrl" placeholder="Lien Vidéo">
            <button class="btn btn-add" onclick="addArchive()">Publier le Replay</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDmRpW6YTVDKiFGOOLgF4_WjcS-7d5lYFQ",
            authDomain: "rtb-27dce.firebaseapp.com",
            databaseURL: "https://rtb-27dce-default-rtdb.firebaseio.com",
            projectId: "rtb-27dce",
            storageBucket: "rtb-27dce.firebasestorage.app",
            messagingSenderId: "935195587386",
            appId: "1:935195587386:web:fc2d62a42857b1caeb9603"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPass() { if(document.getElementById('passInput').value === "RTB2026") document.getElementById('loginOverlay').style.display='none'; }

        db.ref('rtb_config').on('value', snap => {
            const d = snap.val() || {};
            document.getElementById('directUrl').value = d.directUrl || "";
            document.getElementById('slogan').value = d.slogan || "";
            document.getElementById('whatsapp').value = d.whatsapp || "";
            document.getElementById('allowDownload').value = d.allowDownload || "non";
        });

        function saveGeneral() {
            const url = document.getElementById('directUrl').value;
            // SECURITÉ DÉMO : Empêche de coller une image à la place d'une vidéo
            if(url.includes('.jpg') || url.includes('.png') || url.includes('.jpeg')) {
                alert("❌ ERREUR : Vous essayez de mettre une IMAGE dans le flux VIDÉO. Le lien doit finir par .mp4 ou .m3u8");
                return;
            }
            db.ref('rtb_config').update({
                directUrl: url, slogan: document.getElementById('slogan').value,
                whatsapp: document.getElementById('whatsapp').value, allowDownload: document.getElementById('allowDownload').value
            }).then(() => alert("🚀 Antenne à jour !"));
        }

        db.ref('archives').on('value', snap => {
            const data = snap.val();
            const list = document.getElementById('archiveList');
            list.innerHTML = "";
            if(data) Object.keys(data).forEach(k => {
                list.innerHTML += `<div class="archive-item"><span>${data[k].title}</span><button class="del-btn" onclick="deleteArchive('${k}')">Supprimer</button></div>`;
            });
        });

        function addArchive() {
            const t = document.getElementById('newTitle').value, img = document.getElementById('newThumb').value, v = document.getElementById('newUrl').value;
            if(t && img && v) db.ref('archives').push({title:t, thumb:img, url:v}).then(() => {
                document.getElementById('newTitle').value=""; document.getElementById('newThumb').value=""; document.getElementById('newUrl').value="";
            });
        }

        function deleteArchive(id) { if(confirm("Supprimer ce replay ?")) db.ref('archives').child(id).remove(); }
    </script>
</body>
</html>
